name: Update Kindle sale site

on:
  # CREATORSAPI_*のSecretsを登録するまで自動実行を止めておく(失敗メール防止)
  # 登録が終わったらこのコメントを外す
  # schedule:
  #   - cron: "7 * * * *"  # 毎時7分に実行 (UTC)
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      # サプライチェーン対策: アクションはタグでなくコミットSHAで固定する
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Fetch sale data from Creators API
        env:
          CREATORSAPI_CREDENTIAL_ID: ${{ secrets.CREATORSAPI_CREDENTIAL_ID }}
          CREATORSAPI_CREDENTIAL_SECRET: ${{ secrets.CREATORSAPI_CREDENTIAL_SECRET }}
          CREATORSAPI_PARTNER_TAG: ${{ secrets.CREATORSAPI_PARTNER_TAG }}
          DEBUG_RAW_ITEM: "1" # TODO: 調査用。原因判明後に削除する
        run: python scripts/fetch_sales.py

      - name: Generate site
        run: python scripts/generate_site.py

      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3.0.1
        with:
          path: docs

      - id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
