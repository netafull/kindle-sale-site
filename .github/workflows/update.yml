name: Update Kindle sale site

on:
  schedule:
    # GitHub Actionsのスケジューラーは高負荷時に発火をスキップすることが
    # あるため、30分おきの2本立てにして片方が飛んでも拾えるようにする
    - cron: "7 * * * *"   # 毎時7分に実行 (UTC)
    - cron: "37 * * * *"  # 毎時37分に実行 (UTC)
  workflow_dispatch:

permissions:
  contents: write  # campaign_state.json(企画の掲載開始日)のコミットに必要
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      # サプライチェーン対策: アクションはタグでなくコミットSHAで固定する
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Fetch sale data from Creators API
        env:
          CREATORSAPI_CREDENTIAL_ID: ${{ secrets.CREATORSAPI_CREDENTIAL_ID }}
          CREATORSAPI_CREDENTIAL_SECRET: ${{ secrets.CREATORSAPI_CREDENTIAL_SECRET }}
          CREATORSAPI_PARTNER_TAG: ${{ secrets.CREATORSAPI_PARTNER_TAG }}
        run: python scripts/fetch_sales.py

      - name: Generate site
        run: python scripts/generate_site.py

      # 企画の掲載開始日を毎時実行をまたいで永続化する。
      # pushトリガーは設定していないのでループはしない
      - name: Persist campaign state
        run: |
          git add data/campaign_state.json
          if ! git diff --cached --quiet; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git commit -m "企画の掲載開始日を更新 [bot]"
            # 再生成されたsales.json/docsが未ステージで残っていても
            # rebaseできるようautostashを使う
            git pull --rebase --autostash origin main
            git push
          fi

      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3.0.1
        with:
          path: docs

      - id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
